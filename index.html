<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetroMedia Chat</title>
<link rel="stylesheet" href="style.css">

<!-- AdSense script placeholder; uncomment and add your client ID when ready -->
<!-- <script data-ad-client="YOUR-ADSENSE-CLIENT-ID" async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script> -->
</head>
<body>

<h2>Select Your City</h2>
<select id="citySelect">
  <option value="delhi">Delhi</option>
  <option value="bangalore">Bangalore</option>
  <option value="mumbai">Mumbai</option>
  <option value="hyderabad">Hyderabad</option>
  <option value="chennai">Chennai</option>
  <option value="kolkata">Kolkata</option>
  <option value="ahmedabad">Ahmedabad</option>
  <option value="lucknow">Lucknow</option>
  <option value="jaipur">Jaipur</option>
  <option value="noida">Noida</option>
  <option value="nagpur">Nagpur</option>
  <option value="pune">Pune</option>
  <option value="kochi">Kochi</option>
</select>

<h2>Select Metro Line</h2>
<select id="lineSelect"></select>
<button id="proceedBtn">Proceed</button>

<div id="access" style="display:none; margin-top:20px;">
  <button id="payBtn">Pay ₹10 for Full-Day Chat (Any Line)</button>
  <button id="adBtn">Watch Ad for 10-min Read-Only (Selected Line)</button>
</div>

<div id="chatScreen" style="display:none; margin-top:20px;">
  <div id="chatMessages" style="height:300px; overflow-y:auto; border:1px solid #000;"></div>
  <input id="messageInput" placeholder="Type message" style="width:80%;">
  <button id="sendBtn">Send</button>
</div>

<script src="app.js"></script>
</body>
</html>
