<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MetroPulse 🚇</title>

<link rel="stylesheet" href="style.css">

<!-- PWA SETTINGS -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<!-- ADSENSE (ENABLE AFTER APPROVAL)

<script async
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=YOUR_ADSENSE_ID"
crossorigin="anonymous"></script>

-->

</head>

<body>

<h1>🚇 MetroPulse</h1>
<p class="tag">Live commuter chat</p>


<!-- LINE SELECTOR -->

<div class="card">

<h2>Select Metro Line</h2>

<select id="line">

<option>Blue Line</option>
<option>Yellow Line</option>
<option>Pink Line</option>
<option>Purple Line</option>

</select>

</div>


<!-- CROWD REPORT -->

<div class="card">

<h2>Report Crowd</h2>

<button onclick="report('empty')">👍 Empty</button>
<button onclick="report('normal')">😐 Normal</button>
<button onclick="report('packed')">😵 Packed</button>

</div>



<!-- CHAT ENTRY -->

<div id="unlockBox" class="card hidden">

<h2>Enter Chat</h2>

<button onclick="watchAd()">🎬 Watch Ad</button>

<p class="small">
Watch ad to unlock chat preview
</p>

</div>



<!-- CHAT AREA -->

<div id="chatArea" class="card hidden">

<h2>Live Chat</h2>

<div id="timer" class="timer"></div>

<div class="chat" id="chatBox">

<p>Seat 42: Blue line packed today</p>
<p>Seat 12: Rajiv Chowk crazy rush</p>

</div>



<!-- AD AREA -->

<div class="ad">

Free users must watch ads to read chat.

<!-- ADSENSE UNIT (ENABLE AFTER APPROVAL)

<ins class="adsbygoogle"
style="display:block"
data-ad-client="YOUR_ADSENSE_ID"
data-ad-slot="YOUR_SLOT_ID"
data-ad-format="auto"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

-->

</div>



<!-- CHAT PAYMENT -->

<button onclick="payChat()">💬 Unlock Chat ₹10</button>

</div>



<!-- FOOTER -->

<footer>

MetroPulse Prototype  
Contact: hello@metropulse.app

</footer>



<!-- MAIN APP SCRIPT -->

<script src="script.js"></script>


<!-- DEMO CHAT SIMULATION (DELETE WHEN REAL CHAT READY) -->

<script src="demo-sim.js"></script>



<!-- SERVICE WORKER REGISTRATION -->

<script>

if ("serviceWorker" in navigator) {

navigator.serviceWorker.register("service-worker.js");

}

</script>



</body>
</html>
